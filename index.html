<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #0D0D0D; }
  body { overflow: hidden; }
  a { color: #7A7A7A; text-decoration: none; }
  a:hover { color: #EDE9E0; }
  @keyframes ab-spin { to { transform: rotate(360deg); } }
  @keyframes ab-rise { from { opacity: 0; transform: translateY(48px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ab-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ab-dotpulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(111,191,138,0.5); } 50% { opacity: 0.65; box-shadow: 0 0 0 5px rgba(111,191,138,0); } }
  @keyframes ab-grain {
    0%   { transform: translate(0,0); }
    10%  { transform: translate(-6%,-4%); }
    20%  { transform: translate(-11%,6%); }
    30%  { transform: translate(6%,-11%); }
    40%  { transform: translate(-4%,14%); }
    50%  { transform: translate(-12%,4%); }
    60%  { transform: translate(14%,0); }
    70%  { transform: translate(0,11%); }
    80%  { transform: translate(-14%,-3%); }
    90%  { transform: translate(10%,6%); }
    100% { transform: translate(4%,0); }
  }
  @keyframes ab-breathe {
    0%,100% { opacity: 0.72; transform: scale(1) translateY(0); }
    50%     { opacity: 1; transform: scale(1.07) translateY(-1.4%); }
  }
  @media (prefers-reduced-motion: reduce) { [data-motion] { animation: none !important; } }
  @media (max-width: 640px) {
    body { overflow-x: hidden; }
    [data-m="head"] { flex-direction: column !important; gap: 0.1em !important; align-items: flex-start !important; }
    [data-m="avail"] { top: 20px !important; left: 20px !important; font-size: 9.5px !important; max-width: 42vw; }
    [data-m="email"] { top: 20px !important; right: 20px !important; font-size: 9.5px !important; }
    [data-m="about"] { top: auto !important; bottom: 22px !important; font-size: 9.5px !important; }
    [data-m="austin"] { bottom: 22px !important; left: 20px !important; font-size: 9.5px !important; }
    [data-m="copy"] { bottom: 22px !important; right: 20px !important; font-size: 9.5px !important; }
  }
  @media (max-width: 380px) {
    [data-m="avail"] { display: none !important; }
  }
</style>

<body>
<div data-root style="position:relative; width:100%; min-height:100dvh; background:#0D0D0D; overflow:hidden; cursor:none; -webkit-tap-highlight-color:transparent;">

  <!-- Ambient volumetric lights — rendered on a 15%-res canvas, CSS-scaled up (cheap) -->
  <canvas data-ambient style="position:absolute; inset:0; z-index:0; width:100%; height:100%; pointer-events:none; display:block;"></canvas>

  <!-- Cursor particle constellation (reveals + scatters near the cursor) -->
  <canvas data-particle style="position:absolute; inset:0; z-index:6; width:100%; height:100%; pointer-events:none; display:block;"></canvas>

  <!-- radial glow + vignette -->
  <div data-motion style="position:absolute; inset:0; pointer-events:none; transform-origin:50% 34%; animation:ab-breathe 17s ease-in-out infinite; background:
      radial-gradient(ellipse 70% 55% at 50% 30%, rgba(237,233,224,0.07), rgba(237,233,224,0) 62%),
      radial-gradient(ellipse 60% 60% at 50% 42%, rgba(180,150,90,0.05), rgba(0,0,0,0) 55%),
      radial-gradient(circle at 50% 44%, rgba(0,0,0,0) 38%, rgba(0,0,0,0.55) 100%);"></div>

  <!-- film grain (living) -->
  <div data-motion style="position:absolute; inset:-60%; pointer-events:none; opacity:0.06; mix-blend-mode:overlay; animation:ab-grain 0.7s steps(1) infinite; background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22140%22 height=%22140%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.85%22 numOctaves=%222%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E'); background-size:200px 200px;"></div>

  <!-- top-left availability -->
  <div data-avail data-m="avail" style="position:absolute; top:34px; left:60px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.18em; color:#7A7A7A; text-transform:uppercase; animation:ab-fade 1.2s ease 0.7s both;">Available for projects</div>

  <!-- top-right email -->
  <a data-email href="mailto:ascencion@aceburney.com" data-m="email" aria-label="Send email to ascencion@aceburney.com" style="position:absolute; top:34px; right:60px; z-index:20; display:inline-flex; align-items:center; gap:0.4em; white-space:nowrap; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#7A7A7A; text-decoration:none; transition:color .3s ease; animation:ab-fade 1.2s ease 0.7s both;"><span data-email-text style="display:inline-block; text-align:right;">Let's talk</span></a>

  <!-- center stack -->
  <div style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 24px; text-align:center; pointer-events:none;">

    <!-- headline -->
    <div data-head data-m="head" style="user-select:none; cursor:none; pointer-events:auto; display:flex; flex-wrap:nowrap; align-items:baseline; justify-content:center; gap:clamp(1rem, 4vw, 4rem);">
      <div style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:700; color:#e8e6e1; text-transform:uppercase; font-size:clamp(2.4rem, 12.5vw, 15rem); line-height:0.9; letter-spacing:-0.01em; white-space:nowrap; animation:ab-rise 1s cubic-bezier(.2,.8,.2,1) 0.05s both;">
        <span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">A</span><span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">C</span><span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">E</span>
      </div>
      <div style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:700; color:#e8e6e1; text-transform:uppercase; font-size:clamp(2.4rem, 12.5vw, 15rem); line-height:0.9; letter-spacing:-0.01em; white-space:nowrap; animation:ab-rise 1s cubic-bezier(.2,.8,.2,1) 0.16s both;">
        <span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">B</span><span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">U</span><span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">R</span><span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">N</span><span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">E</span><span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">Y</span><span data-k style="display:inline-block; will-change:transform; transition:transform .82s cubic-bezier(.34,1.28,.4,1);">.</span>
      </div>
    </div>
  </div>

  <!-- footer -->
  <div data-m="austin" style="position:absolute; bottom:34px; left:60px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.18em; color:#7A7A7A; text-transform:uppercase; animation:ab-fade 1.2s ease 1.05s both;">Austin, Texas</div>
  <a data-about href="/about" data-m="about" style="position:absolute; top:34px; left:50%; transform:translateX(-50%); z-index:20; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.18em; color:#B4AEA4; text-transform:uppercase; transition:color .3s ease; animation:ab-fade 1.2s ease 0.7s both;">About</a>
  <div data-m="copy" style="position:absolute; bottom:34px; right:60px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.18em; color:#7A7A7A; text-transform:uppercase; animation:ab-fade 1.2s ease 1.05s both;">© 2026</div>

  <!-- custom cursor -->
  <div data-cursor style="position:fixed; top:0; left:0; width:26px; height:26px; border:1px solid rgba(237,233,224,0.55); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-100px,-100px); transition:width .25s ease, height .25s ease, background-color .25s ease, border-color .25s ease; mix-blend-mode:difference;"></div>

  <!-- scene-cut transition overlay (page-to-page) -->
  <div data-transition style="position:fixed; inset:0; z-index:9998; background:#0D0D0D; transform:translateY(-101%); pointer-events:none; will-change:transform; transition:transform 520ms cubic-bezier(.76,0,.24,1); display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; padding:0 24px;">
      <div data-transition-eyebrow style="font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.22em; color:#7A7A7A; text-transform:uppercase; margin-bottom:22px; opacity:0; transition:opacity .5s ease;">— Now Arriving —</div>
      <div data-transition-label style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:700; color:#e8e6e1; text-transform:uppercase; font-size:clamp(3rem,11vw,9rem); line-height:0.9; letter-spacing:-0.03em; opacity:0; transition:opacity .3s ease; white-space:nowrap;">&nbsp;</div>
    </div>
  </div>

  <!-- page loader (slides up on complete) -->
  <div data-loader style="position:absolute; inset:0; z-index:9990; background:#0D0D0D; display:flex; flex-direction:column; justify-content:flex-end; padding:clamp(24px,4vw,60px); will-change:transform; transition:transform 1s cubic-bezier(.76,0,.24,1);">
    <div style="position:absolute; top:clamp(24px,4vw,34px); left:clamp(24px,4vw,60px); font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.18em; color:#7A7A7A; text-transform:uppercase;">Ace Burney</div>
    <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:24px;">
      <div style="font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.18em; color:#7A7A7A; text-transform:uppercase; padding-bottom:0.6em;">Loading</div>
      <div data-counter style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight:700; color:#e8e6e1; font-size:clamp(4rem,13vw,11rem); line-height:0.78; letter-spacing:-0.03em;">000</div>
    </div>
    <div style="margin-top:clamp(16px,2vw,24px); height:1px; width:100%; background:rgba(122,122,122,0.22); position:relative; overflow:hidden;">
      <div data-bar style="position:absolute; top:0; bottom:0; left:0; right:100%; background:#e8e6e1; transition:right .14s linear;"></div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  const $ = (sel, ctx) => (ctx || document).querySelector(sel);
  const $$ = (sel, ctx) => Array.from((ctx || document).querySelectorAll(sel));
  const root = $('[data-root]');
  const head = $('[data-head]');
  const avail = $('[data-avail]');
  const emailEl = $('[data-email]');
  const cursor = $('[data-cursor]');
  const ambient = $('[data-ambient]');
  const particle = $('[data-particle]');
  const loader = $('[data-loader]');
  const counter = $('[data-counter]');
  const bar = $('[data-bar]');
  const about = $('[data-about]');
  const letters = $$('[data-k]', root);
  const transition = $('[data-transition]');
  const transitionLabel = $('[data-transition-label]');
  const transitionEyebrow = $('[data-transition-eyebrow]');

  const state = {
    words: ['PRODUCT STRATEGY', 'STORY TELLING', 'BRAND DESIGN', 'PRODUCT DESIGN', 'DESIGN SYSTEMS', 'WEB DESIGN', 'PHOTOGRAPHY', 'FILM', 'AI AUTOMATION', 'CREATIVE TECHNOLOGY'],
    wi: 0,
    mx: -9999, my: -9999, mouseSpeed: 0,
    _pmx: 0, _pmy: 0,
    _cx: -100, _cy: -100,
    _aboutHover: false,
  };
  const timers = {};

  // ---------- mouse tracking (position + speed) ----------
  const onMove = (e) => {
    const dx = e.clientX - state._pmx;
    const dy = e.clientY - state._pmy;
    state.mouseSpeed = Math.min(Math.hypot(dx, dy), 60);
    state._pmx = e.clientX; state._pmy = e.clientY;
    state.mx = e.clientX; state.my = e.clientY;
  };
  window.addEventListener('mousemove', onMove);
  const onLeaveWin = () => { state.mx = -9999; state.my = -9999; state.mouseSpeed = 0; };
  document.addEventListener('mouseleave', onLeaveWin);
  window.addEventListener('blur', onLeaveWin);

  // ---------- shared scramble (34ms/frame, width-locked via NBSP) ----------
  function scramble(el, target) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#·/-';
    clearInterval(el._timer);
    const from = el.textContent || '';
    const len = Math.max(from.length, target.length);
    const queue = [];
    for (let i = 0; i < len; i++) {
      const start = Math.floor(Math.random() * 8);
      const end = start + 8 + Math.floor(Math.random() * 10);
      queue.push({ to: target[i] || '', start, end, ch: '' });
    }
    let frame = 0;
    el._timer = setInterval(() => {
      let out = '';
      let done = 0;
      for (const q of queue) {
        if (frame >= q.end) { done++; out += q.to; }
        else if (frame >= q.start) {
          if (!q.ch || Math.random() < 0.32) q.ch = chars[Math.floor(Math.random() * chars.length)];
          out += q.ch;
        }
        else { out += ' '; }
      }
      el.textContent = out;
      frame++;
      if (done >= queue.length) clearInterval(el._timer);
    }, 34);
  }

  function nextWord() {
    if (!avail) return;
    scramble(avail, state.words[state.wi]);
    state.wi = (state.wi + 1) % state.words.length;
  }
  function resetWord() {
    if (avail) scramble(avail, 'AVAILABLE FOR PROJECTS');
  }

  // ---------- headline hover + tap ----------
  head.addEventListener('mouseenter', nextWord);
  head.addEventListener('mouseleave', resetWord);
  head.addEventListener('click', () => {
    nextWord();
    clearTimeout(timers.tap);
    timers.tap = setTimeout(resetWord, 1400);
  });

  // ---------- About link easter egg ----------
  if (about) {
    about.addEventListener('mouseenter', () => { state._aboutHover = true; scramble(about, 'ABOUT'); });
    about.addEventListener('mouseleave', () => { state._aboutHover = false; });
    timers.aboutCue = setInterval(() => {
      if (state._aboutHover || document.hidden) return;
      scramble(about, 'ASCENCION');
      timers.aboutCueBack = setTimeout(() => {
        if (state._aboutHover) return;
        scramble(about, 'ABOUT');
      }, 1600);
    }, 7500);
  }

  // ---------- email hover scramble (width-locked) ----------
  function setupEmail() {
    if (!emailEl) return;
    const textEl = emailEl.querySelector('[data-email-text]');
    const SRC = "Let's talk";
    const DST = 'ascencion@aceburney.com';
    const POOL = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const DUR = 500;
    const THROTTLE = 60;
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const lock = () => {
      textEl.textContent = DST;
      const w = textEl.getBoundingClientRect().width;
      textEl.style.minWidth = w + 'px';
      textEl.textContent = SRC;
    };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(lock); else lock();

    let timer = 0;
    let current = SRC;
    let fadeT = 0;

    const run = (target) => {
      clearInterval(timer);
      if (reduce) {
        textEl.style.transition = 'opacity .2s ease';
        textEl.style.opacity = '0';
        clearTimeout(fadeT);
        fadeT = setTimeout(() => {
          textEl.textContent = target; current = target; textEl.style.opacity = '1';
        }, 200);
        return;
      }
      const from = current;
      const len = Math.max(from.length, target.length);
      const settle = new Array(len);
      const lastSwap = new Array(len);
      const shown = new Array(len);
      for (let i = 0; i < len; i++) {
        settle[i] = (0.15 + Math.random() * 0.75) * DUR;
        lastSwap[i] = -Infinity;
        shown[i] = from[i] !== undefined ? from[i] : ' ';
      }
      const start = performance.now();
      const frame = () => {
        const now = performance.now();
        const t = now - start;
        let out = '';
        let done = 0;
        for (let i = 0; i < len; i++) {
          const tgt = target[i] !== undefined ? target[i] : ' ';
          if (t >= settle[i]) { out += tgt; done++; }
          else {
            if (now - lastSwap[i] >= THROTTLE) {
              shown[i] = POOL[(Math.random() * POOL.length) | 0];
              lastSwap[i] = now;
            }
            out += shown[i];
          }
        }
        textEl.textContent = out;
        if (done >= len) { clearInterval(timer); textEl.textContent = target; current = target; }
      };
      timer = setInterval(frame, 16);
      frame();
    };

    const enter = () => { cursorGrow(true); run(DST); };
    const leave = () => { cursorGrow(false); run(SRC); };
    emailEl.addEventListener('mouseenter', enter);
    emailEl.addEventListener('mouseleave', leave);
    emailEl.addEventListener('focus', enter);
    emailEl.addEventListener('blur', leave);
  }

  // ---------- scene-cut transition (page-to-page nav) ----------
  function pageLabelFromPath(path) {
    if (path === '/' || path === '/index.html' || path === '/index') return 'HOME';
    return path.replace(/^\/|\.html$/g, '').replace(/-/g, ' ').toUpperCase() || 'HOME';
  }

  function playSceneExit(destUrl, destLabel) {
    if (!transition || !transitionLabel) { location.href = destUrl; return; }
    // Reset from any prior entry that left it display:none / off-screen
    transition.style.transition = 'none';
    transition.style.display = 'flex';
    transition.style.transform = 'translateY(-101%)';
    transition.style.pointerEvents = 'auto';
    transitionLabel.style.opacity = '0';
    if (transitionEyebrow) transitionEyebrow.style.opacity = '0';
    transition.offsetHeight; // force reflow so the next transition applies
    transition.style.transition = 'transform 520ms cubic-bezier(.76,0,.24,1)';
    transition.style.transform = 'translateY(0)';
    setTimeout(() => {
      if (transitionEyebrow) transitionEyebrow.style.opacity = '1';
      transitionLabel.style.opacity = '1';
      scramble(transitionLabel, destLabel);
    }, 240);
    setTimeout(() => {
      try { sessionStorage.setItem('pendingEntry', destLabel); } catch(e) {}
      location.href = destUrl;
    }, 1050);
  }

  function initNavIntercept() {
    if (!transition) return;
    document.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if (!a) return;
      const href = a.getAttribute('href');
      if (!href || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('#')) return;
      if (a.target === '_blank') return;
      let url;
      try { url = new URL(href, location.href); } catch(_) { return; }
      if (url.origin !== location.origin) return;
      if (url.pathname === location.pathname) return;
      e.preventDefault();
      playSceneExit(url.href, pageLabelFromPath(url.pathname));
    });
  }

  function playSceneEntry() {
    if (!transition) return false;
    let pending = null;
    try { pending = sessionStorage.getItem('pendingEntry'); } catch(e) {}
    if (!pending) return false;
    try { sessionStorage.removeItem('pendingEntry'); } catch(e) {}
    // Kill the loader — the scene-cut overlay is doing the reveal
    if (loader) {
      loader.style.transition = 'none';
      loader.style.transform = 'translateY(-101%)';
      loader.style.pointerEvents = 'none';
      loader.style.display = 'none';
    }
    transition.style.transition = 'none';
    transition.style.transform = 'translateY(0)';
    transition.style.pointerEvents = 'auto';
    if (transitionEyebrow) transitionEyebrow.style.opacity = '1';
    transitionLabel.style.opacity = '1';
    transitionLabel.textContent = pending;
    transition.offsetHeight;
    transition.style.transition = 'transform 520ms cubic-bezier(.76,0,.24,1)';
    const readyPromise = Promise.all([
      (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve(),
      (document.readyState === 'complete') ? Promise.resolve() : new Promise((r) => window.addEventListener('load', r, { once: true })),
    ]);
    Promise.race([readyPromise, new Promise((r) => setTimeout(r, 4000))]).then(() => {
      setTimeout(() => {
        if (transitionEyebrow) transitionEyebrow.style.opacity = '0';
        transitionLabel.style.opacity = '0';
        transition.style.transform = 'translateY(-101%)';
        setTimeout(() => {
          transition.style.display = 'none';
          transition.style.pointerEvents = 'none';
          try { sessionStorage.setItem('hasEntered', '1'); } catch(e) {}
        }, 620);
      }, 320);
    });
    return true;
  }

  // ---------- loader ----------
  function initLoader() {
    if (!loader) return;
    const finish = () => {
      try { sessionStorage.setItem('hasEntered', '1'); } catch(e) {}
      loader.style.transform = 'translateY(-101%)';
      loader.style.pointerEvents = 'none';
      setTimeout(() => { loader.style.display = 'none'; }, 1100);
    };
    // If we came in via scene-cut, transition overlay handles reveal — hide loader
    let pendingEntry = null;
    try { pendingEntry = sessionStorage.getItem('pendingEntry'); } catch(e) {}
    if (pendingEntry) {
      if (counter) counter.textContent = '100';
      if (bar) bar.style.right = '0%';
      loader.style.transition = 'none';
      loader.style.transform = 'translateY(-101%)';
      loader.style.pointerEvents = 'none';
      loader.style.display = 'none';
      return;
    }
    // Skip loader on subsequent in-session visits (e.g. About → Home)
    let hasEntered = false;
    try { hasEntered = sessionStorage.getItem('hasEntered') === '1'; } catch(e) {}
    if (hasEntered) {
      if (counter) counter.textContent = '100';
      if (bar) bar.style.right = '0%';
      loader.style.transition = 'none';
      loader.style.transform = 'translateY(-101%)';
      loader.style.pointerEvents = 'none';
      loader.style.display = 'none';
      return;
    }
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      if (counter) counter.textContent = '100';
      if (bar) bar.style.right = '0%';
      setTimeout(finish, 400);
      return;
    }
    let p = 0;
    let ready = false;
    const readyPromise = Promise.all([
      (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve(),
      (document.readyState === 'complete') ? Promise.resolve()
        : new Promise((res) => window.addEventListener('load', res, { once: true })),
    ]);
    Promise.race([
      readyPromise,
      new Promise((res) => setTimeout(res, 6000)),
    ]).then(() => { ready = true; });
    timers.loader = setInterval(() => {
      const ceil = ready ? 100 : 90;
      p = Math.min(p + Math.random() * 14, ceil);
      if (p >= 100) {
        p = 100;
        clearInterval(timers.loader);
        if (counter) counter.textContent = '100';
        if (bar) bar.style.right = '0%';
        setTimeout(finish, 380);
      } else {
        if (counter) counter.textContent = String(Math.floor(p)).padStart(3, '0');
        if (bar) bar.style.right = (100 - p) + '%';
      }
    }, 90);
  }

  // ---------- custom cursor ----------
  function cursorGrow(big) {
    if (!cursor) return;
    cursor.style.width = big ? '46px' : '26px';
    cursor.style.height = big ? '46px' : '26px';
    cursor.style.backgroundColor = big ? 'rgba(237,233,224,0.9)' : 'transparent';
  }
  function initCustomCursor() {
    if (!cursor) return;
    if (matchMedia('(hover: none) and (pointer: coarse)').matches) { cursor.style.display = 'none'; return; }
    const hoverSel = 'a, button, [role="button"], [data-k]';
    root.addEventListener('mouseover', (e) => { if (e.target.closest(hoverSel)) cursorGrow(true); });
    root.addEventListener('mouseout', (e) => { if (e.target.closest(hoverSel)) cursorGrow(false); });
    const loop = () => {
      state._cx += (state.mx - state._cx) * 0.18;
      state._cy += (state.my - state._cy) * 0.18;
      cursor.style.transform = 'translate(' + (state._cx - 13).toFixed(1) + 'px, ' + (state._cy - 13).toFixed(1) + 'px)';
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }

  // ---------- ambient volumetric lights ----------
  function initAmbient() {
    if (!ambient) return;
    const ctx = ambient.getContext('2d');
    const SCALE = 0.15;
    let w, h;
    const resize = () => {
      w = Math.max(1, Math.ceil((root.clientWidth || window.innerWidth) * SCALE));
      h = Math.max(1, Math.ceil((root.clientHeight || window.innerHeight) * SCALE));
      ambient.width = w; ambient.height = h;
    };
    resize();
    window.addEventListener('resize', resize, { passive: true });
    const lights = [
      { cx: 0.12, cy: 0.18, r: 0.40, a: 0.13, phase: 0 },
      { cx: 0.82, cy: 0.76, r: 0.34, a: 0.10, phase: 1.8 },
      { cx: 0.76, cy: 0.10, r: 0.30, a: 0.085, phase: 3.2 },
      { cx: 0.08, cy: 0.82, r: 0.32, a: 0.105, phase: 4.7 },
      { cx: 0.48, cy: 0.48, r: 0.26, a: 0.06, phase: 2.5 },
      { cx: 0.55, cy: 0.25, r: 0.28, a: 0.08, phase: 5.5 },
    ];
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    let t = 0;
    const draw = () => {
      ctx.clearRect(0, 0, w, h);
      t += 0.006;
      lights.forEach((l) => {
        const bx = (l.cx + Math.sin(t * 1.1 + l.phase) * 0.08 + Math.sin(t * 0.5 + l.phase * 2.3) * 0.05 + Math.sin(t * 0.2 + l.phase * 0.7) * 0.03) * w;
        const by = (l.cy + Math.cos(t * 0.9 + l.phase * 1.2) * 0.07 + Math.cos(t * 0.4 + l.phase * 1.8) * 0.06 + Math.cos(t * 0.15 + l.phase * 0.5) * 0.04) * h;
        const baseR = l.r * Math.min(w, h);
        for (let j = 0; j < 4; j++) {
          const ox = bx + Math.sin(t * (0.4 + j * 0.1) + j * 1.7 + l.phase) * baseR * 0.35;
          const oy = by + Math.cos(t * (0.35 + j * 0.08) + j * 2.3 + l.phase * 0.8) * baseR * 0.3;
          const sr = baseR * (0.55 + j * 0.12);
          const sa = l.a * (0.4 - j * 0.05);
          const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, sr * 1.2);
          grad.addColorStop(0, 'rgba(255,255,255,' + sa.toFixed(4) + ')');
          grad.addColorStop(0.5, 'rgba(255,255,255,' + (sa * 0.3).toFixed(4) + ')');
          grad.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = grad;
          ctx.beginPath();
          const steps = 20;
          const seed = l.phase + j * 3.14;
          for (let s = 0; s <= steps; s++) {
            const angle = (s / steps) * Math.PI * 2;
            const distort = 1 + 0.25 * Math.sin(angle * 2 + t * 0.6 + seed) + 0.15 * Math.sin(angle * 3 + t * 0.4 + seed * 1.7) + 0.1 * Math.sin(angle * 5 + t * 0.9 + seed * 0.5);
            const pr = sr * distort;
            const px = ox + Math.cos(angle) * pr;
            const py = oy + Math.sin(angle) * pr;
            if (s === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
        }
      });
      if (!reduce) requestAnimationFrame(draw);
    };
    draw();
  }

  // ---------- cursor particles ----------
  function initParticles() {
    const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isTouch || !particle) return;
    const ctx = particle.getContext('2d');
    const REVEAL_R = 200, REPULSE_R = 160, REPULSE_FORCE = 5, COLLAPSE_FORCE = 0.12;
    const HOME_SPRING = 0.004, FRICTION = 0.88, JITTER = 1.0, DART_CHANCE = 0.03, DART_FORCE = 4;
    const CONNECT_R = 55, SPACING = 35, SIZE = 1.1, COL = '232,228,222';
    let w, h, offX = 0, offY = 0, particles = [];
    const seedParticles = () => {
      particles = [];
      const cols = Math.ceil(w / SPACING) + 1;
      const rows = Math.ceil(h / SPACING) + 1;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const hx = c * SPACING + (Math.random() - 0.5) * SPACING * 0.6;
          const hy = r * SPACING + (Math.random() - 0.5) * SPACING * 0.6;
          particles.push({ homeX: hx, homeY: hy, x: hx, y: hy, vx: 0, vy: 0, alpha: 0 });
        }
      }
    };
    const resize = () => {
      w = particle.width = root.clientWidth || window.innerWidth;
      h = particle.height = root.clientHeight || window.innerHeight;
      const rect = particle.getBoundingClientRect();
      offX = rect.left; offY = rect.top;
      seedParticles();
    };
    resize();
    window.addEventListener('resize', resize, { passive: true });

    const loop = () => {
      ctx.clearRect(0, 0, w, h);
      const isMoving = state.mouseSpeed > 1.5;
      const mx = state.mx > -9000 ? state.mx - offX : -9999;
      const my = state.mx > -9000 ? state.my - offY : -9999;
      const visible = [];
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const dx = p.x - mx;
        const dy = p.y - my;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const nearCursor = dist < REVEAL_R * 1.3;
        const hasVel = Math.abs(p.vx) > 0.06 || Math.abs(p.vy) > 0.06;
        if (!nearCursor && !hasVel && p.alpha < 0.005) continue;
        const targetA = (isMoving && nearCursor) ? Math.max(0, (1 - dist / REVEAL_R)) * 0.6 : 0;
        p.alpha += (targetA - p.alpha) * (targetA > p.alpha ? 0.12 : 0.05);
        if (isMoving && dist < REPULSE_R && dist > 0) {
          const f = (1 - dist / REPULSE_R) * REPULSE_FORCE;
          p.vx += (dx / dist) * f;
          p.vy += (dy / dist) * f;
          p.vx += (Math.random() - 0.5) * JITTER;
          p.vy += (Math.random() - 0.5) * JITTER;
          if (Math.random() < DART_CHANCE) {
            const a = Math.random() * Math.PI * 2;
            p.vx += Math.cos(a) * DART_FORCE;
            p.vy += Math.sin(a) * DART_FORCE;
          }
        } else if (!isMoving && dist < REVEAL_R && dist > 3 && p.alpha > 0.01) {
          p.vx -= (dx / dist) * COLLAPSE_FORCE;
          p.vy -= (dy / dist) * COLLAPSE_FORCE;
        }
        p.vx += (p.homeX - p.x) * HOME_SPRING;
        p.vy += (p.homeY - p.y) * HOME_SPRING;
        p.vx *= FRICTION;
        p.vy *= FRICTION;
        p.x += p.vx;
        p.y += p.vy;
        if (p.alpha > 0.008) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, SIZE, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + COL + ',' + p.alpha.toFixed(3) + ')';
          ctx.fill();
          visible.push(p);
        }
      }
      ctx.lineWidth = 0.3;
      for (let i = 0; i < visible.length; i++) {
        for (let j = i + 1; j < visible.length; j++) {
          const a = visible[i], b = visible[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < CONNECT_R * CONNECT_R) {
            const dist = Math.sqrt(d2);
            const lineA = (1 - dist / CONNECT_R) * Math.min(a.alpha, b.alpha) * 0.12;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = 'rgba(' + COL + ',' + lineA.toFixed(3) + ')';
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(loop);
    };
    loop();
  }

  // ---------- magnetic letter physics ----------
  function initLetterPhysics() {
    const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    const SPRING = 0.065;
    const DAMPING = 0.82;
    const THRESHOLD = isTouch ? 200 : 420;
    const STRENGTH = isTouch ? 60 : 110;

    const states = letters.map((el) => {
      el.style.pointerEvents = 'none';
      el.style.transition = 'none';
      el.style.willChange = 'transform';
      return { el, x: 0, y: 0, vx: 0, vy: 0, cx: 0, cy: 0 };
    });

    const measure = () => {
      for (const s of states) {
        const rect = s.el.getBoundingClientRect();
        s.cx = rect.left + rect.width / 2 - s.x;
        s.cy = rect.top + rect.height / 2 - s.y;
      }
    };
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(measure);
    measure();
    requestAnimationFrame(measure);
    setTimeout(measure, 1300);
    window.addEventListener('resize', measure, { passive: true });

    let scrollEnergy = 0, scrollDir = 1, scrollActive = false;
    root.addEventListener('wheel', (e) => {
      e.preventDefault();
      const dir = e.deltaY > 0 ? 1 : -1;
      scrollEnergy = Math.min(scrollEnergy + Math.min(Math.abs(e.deltaY) / 120, 1.0), 12);
      scrollDir = dir;
      if (dir < 0) {
        const burst = Math.min(Math.abs(e.deltaY) / 50, 3);
        states.forEach((s, i) => {
          const angle = Math.random() * Math.PI * 2;
          const power = burst * (0.5 + Math.random());
          s.vx += Math.cos(angle) * power;
          s.vy += Math.sin(angle) * power - burst * 0.5;
          s.vx += (i % 2 === 0 ? 1 : -1) * burst * 0.3;
        });
      }
      scrollActive = true;
      clearTimeout(timers.scrollT);
      timers.scrollT = setTimeout(() => { scrollActive = false; }, 500);
    }, { passive: false });

    if (isTouch) {
      root.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        state._pmx = t.clientX; state._pmy = t.clientY;
        state.mx = t.clientX; state.my = t.clientY; state.mouseSpeed = 5;
      }, { passive: true });
      root.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        const dx = t.clientX - state._pmx, dy = t.clientY - state._pmy;
        state.mouseSpeed = Math.min(Math.hypot(dx, dy), 60);
        state._pmx = t.clientX; state._pmy = t.clientY;
        state.mx = t.clientX; state.my = t.clientY;
      }, { passive: true });
      root.addEventListener('touchend', () => {
        state.mouseSpeed = 0;
        setTimeout(() => { state.mx = -9999; state.my = -9999; }, 600);
      }, { passive: true });
    }

    const step = () => {
      state.mouseSpeed *= 0.92;
      if (state.mouseSpeed < 0.1) state.mouseSpeed = 0;
      const speedMult = 1 + state.mouseSpeed * 0.04;

      for (const s of states) {
        const el = s.el;
        const restX = s.cx;
        const restY = s.cy;
        const dx = restX - state.mx;
        const dy = restY - state.my;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const hasCursor = state.mx > -9000;

        if (hasCursor && scrollEnergy > 0.1 && scrollDir > 0) {
          const attractStr = scrollEnergy * 0.006;
          s.vx += -dx * attractStr;
          s.vy += -dy * attractStr;
          s.vx *= 0.90; s.vy *= 0.90;
          const newDx = (restX + s.x + s.vx) - state.mx;
          if (dx !== 0 && Math.sign(newDx) !== Math.sign(dx)) { s.x = state.mx - restX; s.vx = 0; }
          const newDy = (restY + s.y + s.vy) - state.my;
          if (dy !== 0 && Math.sign(newDy) !== Math.sign(dy)) { s.y = state.my - restY; s.vy = 0; }
        } else if (dist < THRESHOLD && dist > 0) {
          const falloff = Math.pow(1 - dist / THRESHOLD, 2);
          const force = falloff * STRENGTH * speedMult;
          s.vx += (dx / dist) * force * 0.12;
          s.vy += (dy / dist) * force * 0.12;
        }
        s.vx += -s.x * SPRING;
        s.vy += -s.y * SPRING;
        s.vx *= DAMPING;
        s.vy *= DAMPING;
        s.x += s.vx;
        s.y += s.vy;
        const rot = s.vx * 1.8;
        const disp = Math.sqrt(s.x * s.x + s.y * s.y);
        const scale = scrollEnergy > 0.1 ? 1 : 1 + disp * 0.002;
        if (Math.abs(s.x) > 0.1 || Math.abs(s.y) > 0.1) {
          el.style.transform = 'translate(' + s.x.toFixed(1) + 'px,' + s.y.toFixed(1) + 'px) rotate(' + rot.toFixed(1) + 'deg) scale(' + scale.toFixed(3) + ')';
        } else {
          s.x = 0; s.y = 0; s.vx = 0; s.vy = 0;
          el.style.transform = '';
        }
      }
      if (!scrollActive) scrollEnergy *= 0.93; else scrollEnergy *= 0.97;
      requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  // ---------- boot ----------
  initLetterPhysics();
  setupEmail();
  initCustomCursor();
  initAmbient();
  initParticles();
  initNavIntercept();
  // If we're arriving from a scene-cut, play the entry; otherwise fall through to loader
  if (!playSceneEntry()) initLoader();
})();
</script>
</body>
</html>
